# Dhan Quant Trading Platform Configuration

broker:
  client_id: ""       # Set via DHAN_CLIENT_ID environment variable
  access_token: ""    # Set via DHAN_ACCESS_TOKEN environment variable

trading:
  paper_trade: true   # Set to false for live trading
  default_exchange: NSE
  default_product_type: INTRADAY
  default_order_type: LIMIT

risk:
  max_position_size: 0.05      # Max 5% of portfolio per position
  max_portfolio_risk: 0.20     # Max 20% portfolio at risk
  stop_loss_pct: 0.02          # Default 2% stop-loss
  take_profit_pct: 0.04        # Default 4% take-profit

backtesting:
  initial_capital: 100000
  commission: 0.0003           # 0.03% per trade
  slippage: 0.0001             # 0.01% slippage

logging:
  level: INFO
  file: logs/trading.log

# Option chain configuration
option_chain:
  # Dhan security IDs for common underlyings
  nifty50_security_id: 13
  banknifty_security_id: 25
  finnifty_security_id: 27
  midcpnifty_security_id: 442

  # Default underlying for option strategies
  default_underlying: nifty50
  default_exchange_segment: IDX_I   # IDX_I for indices, NSE_EQ for equities
  default_fno_segment: NSE_FNO

  # Short straddle strategy parameters
  short_straddle:
    min_iv_threshold: 15.0          # Minimum IV (%) to enter a short straddle
    quantity: 1                      # Lots per leg
    product_type: INTRADAY

  # PCR strategy parameters
  pcr_strategy:
    bullish_pcr: 1.5                # PCR above this → buy calls (contrarian)
    bearish_pcr: 0.5                # PCR below this → buy puts (contrarian)
    quantity: 1
    product_type: INTRADAY

